# Serves the built SPA and proxies API calls to the backend container.
# The backend hostname `backend` matches the service name in docker-compose.yml.

upstream api_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Forward API traffic to the FastAPI backend.
    location /api/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow large document uploads.
        client_max_body_size 50m;
    }

    # SPA fallback: every non-file route resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
